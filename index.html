<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#78350f" />
    <title>متجر الشاي الذهبي - POS Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      @media (max-width: 640px) {
        html {
          font-size: 14px;
        }
        .text-3xl {
          font-size: 1.5rem !important;
        }
        .text-2xl {
          font-size: 1.25rem !important;
        }
      }
      .pin-box {
        letter-spacing: 0.5em;
        font-size: clamp(1.5rem, 5vw, 2rem);
      }
      .step {
        font-size: clamp(0.75rem, 2vw, 0.875rem);
        padding: 0.5rem 1rem;
      }
      .step-active {
        background-color: #451a03;
        color: white;
      }
      .sidebar {
        width: 280px;
        transition: transform 0.3s ease;
      }
      @media (max-width: 1024px) {
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          height: 100vh;
          z-index: 40;
          transform: translateX(-100%);
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .sidebar-overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.5);
          z-index: 39;
        }
        .sidebar-overlay.active {
          display: block;
        }
      }
      .sidebar-item {
        padding: clamp(0.75rem, 2vw, 1rem) 1.25rem;
        margin-bottom: 0.5rem;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: clamp(0.875rem, 2vw, 1rem);
      }
      .sidebar-item:hover {
        background-color: #78350f;
      }
      .sidebar-item.active {
        background-color: #78350f;
        font-weight: bold;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 50;
        inset: 0;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        padding: 1rem;
      }
      .modal-content {
        background-color: #fefefe;
        margin: auto;
        padding: 0;
        border-radius: 20px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        animation: slideDown 0.3s ease-out;
        max-height: 90vh;
        overflow-y: auto;
      }
      @keyframes slideDown {
        from {
          transform: translateY(-50px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @media print {
        body * {
          visibility: hidden;
        }
        #receipt,
        #receipt * {
          visibility: visible;
        }
        #receipt {
          position: absolute;
          left: 0;
          top: 0;
          width: 300px;
        }
      }
      .thermal-receipt {
        width: 300px;
        font-family: monospace;
        padding: 15px;
        margin: 10px auto;
        border: 2px dashed #000;
      }
      .sync-success {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        padding: 1rem;
        border-radius: 12px;
        margin-top: 0.5rem;
        font-weight: 600;
        font-size: clamp(0.75rem, 2vw, 0.875rem);
      }
      .sync-error {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
        padding: 1rem;
        border-radius: 12px;
        margin-top: 0.5rem;
        font-weight: 600;
      }
      .sync-loading {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: white;
        padding: 1rem;
        border-radius: 12px;
        margin-top: 0.5rem;
        font-weight: 600;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
      .mobile-menu-btn {
        display: none;
        position: fixed;
        bottom: 1rem;
        left: 1rem;
        z-index: 50;
        background: #78350f;
        color: white;
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 50%;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      @media (max-width: 1024px) {
        .mobile-menu-btn {
          display: flex;
        }
      }
      @media (max-width: 768px) {
        .grid-cols-12 > * {
          grid-column: span 12 !important;
        }
        .grid-cols-2 {
          grid-template-columns: repeat(1, minmax(0, 1fr)) !important;
        }
        .grid-cols-3 {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
        .grid-cols-4 {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
        table {
          font-size: 0.75rem;
        }
        th,
        td {
          padding: 0.5rem !important;
        }
      }
      .setup-link-box {
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        padding: 1rem;
        border-radius: 1rem;
        margin-top: 1rem;
        word-break: break-all;
      }
      .stat-card {
        background: linear-gradient(
          135deg,
          var(--tw-gradient-from),
          var(--tw-gradient-to)
        );
        color: white;
        padding: 1.5rem;
        border-radius: 1.5rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loading-box {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        max-width: 400px;
      }
    </style>
  </head>
  <body class="bg-amber-50">
    <button
      id="mobileMenuBtn"
      class="mobile-menu-btn"
      onclick="toggleMobileSidebar()"
    >
      <i class="fa-solid fa-bars"></i>
    </button>
    <div
      id="sidebarOverlay"
      class="sidebar-overlay"
      onclick="toggleMobileSidebar()"
    ></div>

    <!-- Setup Screen -->
    <div
      id="setupScreen"
      class="min-h-screen hidden flex items-center justify-center bg-gradient-to-br from-amber-900 to-amber-700 p-4"
    >
      <div
        class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden"
      >
        <div class="bg-amber-800 text-white p-4 sm:p-6 text-center">
          <h1 class="text-2xl sm:text-3xl font-bold">🍵 مرحباً بك</h1>
          <p class="mt-2 text-amber-200 text-sm sm:text-base">إعداد النظام</p>
        </div>
        <div class="flex flex-wrap justify-between px-4 sm:px-8 pt-6 gap-2">
          <div id="step1" class="step rounded-full cursor-pointer step-active">
            1. المتجر
          </div>
          <div id="step2" class="step rounded-full cursor-pointer">
            2. المدير
          </div>
          <div id="step3" class="step rounded-full cursor-pointer">
            3. المزامنة
          </div>
        </div>
        <div class="p-4 sm:p-8" id="setupContent"></div>
        <div
          class="flex flex-col sm:flex-row justify-between gap-3 p-4 sm:p-6 border-t"
        >
          <button
            onclick="prevStep()"
            id="btnPrev"
            class="px-6 py-3 text-gray-600 hover:bg-gray-100 rounded-2xl order-2 sm:order-1"
          >
            السابق
          </button>
          <button
            onclick="nextStep()"
            id="btnNext"
            class="px-8 py-3 bg-amber-700 text-white rounded-2xl hover:bg-amber-800 order-1 sm:order-2"
          >
            التالي
          </button>
        </div>
      </div>
    </div>

    <!-- Login Screen -->
    <div
      id="loginScreen"
      class="min-h-screen hidden flex items-center justify-center bg-gradient-to-br from-amber-900 to-amber-700 p-4"
    >
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-6 sm:p-8">
        <h1
          class="text-2xl sm:text-3xl font-bold text-center text-amber-900 mb-2"
          id="shopNameDisplay"
        >
          متجر الشاي
        </h1>
        <p class="text-center text-gray-600 mb-6 sm:mb-8 text-sm sm:text-base">
          أدخل كودك
        </p>
        <div class="mb-6">
          <label class="block text-sm font-semibold mb-2 text-gray-700"
            >الكود السري:</label
          >
          <input
            type="password"
            id="pinInputDirect"
            maxlength="6"
            placeholder="أدخل الكود..."
            class="w-full text-center text-2xl sm:text-4xl tracking-widest py-4 sm:py-5 border-2 border-amber-300 rounded-2xl focus:outline-none focus:border-amber-600 pin-box"
            onkeypress="if (event.key === 'Enter') verifyLoginDirect();"
          />
        </div>
        <button
          onclick="verifyLoginDirect()"
          class="w-full py-4 sm:py-5 bg-amber-700 text-white rounded-2xl font-bold text-lg sm:text-xl hover:bg-amber-800 shadow-lg mb-4"
        >
          <i class="fa-solid fa-right-to-bracket"></i> دخول
        </button>
        <div class="text-center">
          <button
            onclick="showPinPad()"
            class="text-amber-700 text-sm hover:underline"
          >
            لوحة الأرقام
          </button>
        </div>
        <div id="pinPadSection" class="hidden mt-6">
          <input
            type="text"
            id="pinInput"
            maxlength="6"
            readonly
            class="w-full text-center text-3xl sm:text-4xl tracking-widest py-4 sm:py-5 border-2 border-amber-300 rounded-2xl mb-4 pin-box"
            placeholder="••••••"
          />
          <div class="grid grid-cols-3 gap-2 sm:gap-3 mb-4" id="pinPad"></div>
          <div class="flex gap-3 sm:gap-4">
            <button
              onclick="clearPin()"
              class="flex-1 py-3 bg-gray-200 rounded-xl font-semibold"
            >
              مسح
            </button>
            <button
              onclick="verifyLoginPad()"
              class="flex-1 py-3 bg-amber-700 text-white rounded-xl font-semibold"
            >
              دخول
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden min-h-screen">
      <div class="flex">
        <div
          id="sidebar"
          class="sidebar bg-amber-900 text-white p-4 sm:p-5 flex flex-col"
        >
          <div
            class="text-xl sm:text-2xl font-bold text-center mb-6 sm:mb-10 pb-4 border-b border-amber-700"
          >
            🍵 شاي ادرار
          </div>
          <div class="flex-1 overflow-y-auto">
            <div
              onclick="
                navigate(0);
                closeMobileSidebar();
              "
              class="sidebar-item active"
            >
              <i class="fa-solid fa-cash-register"></i> <span>نقطة البيع</span>
            </div>
            <div
              onclick="
                navigate(1);
                closeMobileSidebar();
              "
              class="sidebar-item"
            >
              <i class="fa-solid fa-box"></i> <span>المنتجات</span>
            </div>
            <div
              onclick="
                navigate(2);
                closeMobileSidebar();
              "
              class="sidebar-item"
            >
              <i class="fa-solid fa-users"></i> <span>الديون</span>
            </div>
            <div
              onclick="
                navigate(3);
                closeMobileSidebar();
              "
              class="sidebar-item"
            >
              <i class="fa-solid fa-truck"></i> <span>الموردين</span>
            </div>
            <div
              onclick="
                navigate(4);
                closeMobileSidebar();
              "
              class="sidebar-item"
            >
              <i class="fa-solid fa-chart-bar"></i> <span>التقارير</span>
            </div>
            <div
              onclick="
                navigate(5);
                closeMobileSidebar();
              "
              class="sidebar-item"
            >
              <i class="fa-solid fa-wallet"></i> <span>الخزنة</span>
            </div>
            <div
              onclick="
                navigate(6);
                closeMobileSidebar();
              "
              class="sidebar-item"
            >
              <i class="fa-solid fa-sync"></i> <span>المزامنة</span>
            </div>
            <div
              onclick="
                navigate(7);
                closeMobileSidebar();
              "
              class="sidebar-item"
            >
              <i class="fa-solid fa-user-tie"></i> <span>المدير</span>
            </div>
          </div>
          <div class="mt-auto bg-amber-800 rounded-2xl p-3 sm:p-4">
            <div id="currentUserDisplay" class="text-xs sm:text-sm mb-2"></div>
            <div id="syncIndicator" class="text-xs text-amber-200 mb-2"></div>
            <button
              onclick="logout()"
              class="w-full bg-red-600 hover:bg-red-700 py-2 sm:py-3 rounded-xl text-xs sm:text-sm font-semibold"
            >
              <i class="fa-solid fa-right-from-bracket"></i> خروج
            </button>
          </div>
        </div>
        <div
          class="flex-1 p-4 sm:p-6 lg:p-8 overflow-auto bg-gray-50"
          id="mainContent"
          style="min-height: 100vh"
        ></div>
      </div>
    </div>

    <!-- Modals -->
    <div id="productModal" class="modal">
      <div class="modal-content">
        <div
          class="bg-amber-800 text-white p-4 sm:p-6 rounded-t-2xl flex justify-between items-center"
        >
          <h3 class="text-lg sm:text-xl font-bold" id="modalProductTitle">
            إضافة منتج
          </h3>
          <button
            onclick="closeModal('productModal')"
            class="text-white hover:text-gray-200 text-2xl"
          >
            &times;
          </button>
        </div>
        <div class="p-4 sm:p-6">
          <form id="productForm" onsubmit="saveProduct(event)">
            <input type="hidden" id="prodId" />
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 mb-4">
              <div class="sm:col-span-2">
                <label class="block text-sm font-semibold mb-1"
                  >اسم المنتج</label
                ><input
                  type="text"
                  id="prodName"
                  required
                  class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none"
                />
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">الباركود</label
                ><input
                  type="text"
                  id="prodBarcode"
                  class="w-full p-3 border rounded-xl"
                />
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">الفئة</label
                ><select
                  id="prodCategory"
                  class="w-full p-3 border rounded-xl bg-white"
                >
                  <option value="شاي">شاي</option>
                  <option value="أواني">أواني</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1"
                  >وحدة البيع</label
                ><select
                  id="prodUnit"
                  class="w-full p-3 border rounded-xl bg-white"
                >
                  <option value="piece">قطعة</option>
                  <option value="kg">كيلو</option>
                  <option value="box">علبة</option>
                  <option value="bag">كيس</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">المخزون</label
                ><input
                  type="number"
                  id="prodStock"
                  required
                  class="w-full p-3 border rounded-xl"
                />
              </div>
              <div class="sm:col-span-2 grid grid-cols-3 gap-2 sm:gap-3 mt-2">
                <div>
                  <label class="block text-xs text-gray-500 mb-1"
                    >التكلفة (دج)</label
                  ><input
                    type="number"
                    step="0.01"
                    id="prodCost"
                    class="w-full p-2 border rounded-lg bg-gray-50"
                  />
                </div>
                <div>
                  <label class="block text-xs text-gray-500 mb-1"
                    >الجملة (دج)</label
                  ><input
                    type="number"
                    step="0.01"
                    id="prodWholesale"
                    class="w-full p-2 border rounded-lg bg-gray-50"
                  />
                </div>
                <div>
                  <label class="block text-xs text-amber-600 font-bold mb-1"
                    >التجزئة (دج)</label
                  ><input
                    type="number"
                    step="0.01"
                    id="prodRetail"
                    required
                    class="w-full p-2 border-2 border-amber-200 rounded-lg bg-amber-50 font-bold"
                  />
                </div>
              </div>
            </div>
            <div class="flex gap-3 mt-6">
              <button
                type="button"
                onclick="closeModal('productModal')"
                class="flex-1 py-3 bg-gray-200 rounded-xl font-semibold"
              >
                إلغاء
              </button>
              <button
                type="submit"
                class="flex-1 py-3 bg-amber-700 text-white rounded-xl font-semibold"
              >
                حفظ
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="debtModal" class="modal">
      <div class="modal-content">
        <div
          class="bg-orange-800 text-white p-4 sm:p-6 rounded-t-2xl flex justify-between items-center"
        >
          <h3 class="text-lg sm:text-xl font-bold">تسجيل دين</h3>
          <button
            onclick="closeModal('debtModal')"
            class="text-white hover:text-gray-200 text-2xl"
          >
            &times;
          </button>
        </div>
        <div class="p-4 sm:p-6">
          <form id="debtForm" onsubmit="saveDebt(event)">
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1">اسم المدين</label
              ><input
                type="text"
                id="debtCustomer"
                required
                class="w-full p-3 border rounded-xl"
              />
            </div>
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1">رقم الهاتف</label
              ><input
                type="tel"
                id="debtPhone"
                placeholder="0555123456"
                class="w-full p-3 border rounded-xl"
              />
            </div>
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1">المبلغ (دج)</label
              ><input
                type="number"
                id="debtAmount"
                readonly
                class="w-full p-3 border rounded-xl bg-gray-100 font-bold text-xl"
              />
            </div>
            <div class="flex gap-3 mt-6">
              <button
                type="button"
                onclick="closeModal('debtModal')"
                class="flex-1 py-3 bg-gray-200 rounded-xl font-semibold"
              >
                إلغاء
              </button>
              <button
                type="submit"
                class="flex-1 py-3 bg-orange-700 text-white rounded-xl font-semibold"
              >
                تسجيل
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="supplierModal" class="modal">
      <div class="modal-content">
        <div
          class="bg-blue-800 text-white p-4 sm:p-6 rounded-t-2xl flex justify-between items-center"
        >
          <h3 class="text-lg sm:text-xl font-bold" id="modalSupplierTitle">
            إضافة مورد
          </h3>
          <button
            onclick="closeModal('supplierModal')"
            class="text-white hover:text-gray-200 text-2xl"
          >
            &times;
          </button>
        </div>
        <div class="p-4 sm:p-6">
          <form id="supplierForm" onsubmit="saveSupplier(event)">
            <input type="hidden" id="supplierId" />
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1"
                >اسم المورد / الشركة</label
              ><input
                type="text"
                id="supplierName"
                required
                class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
              />
            </div>
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1">رقم الهاتف</label
              ><input
                type="tel"
                id="supplierPhone"
                placeholder="0555123456"
                class="w-full p-3 border rounded-xl"
              />
            </div>
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1"
                >العنوان (اختياري)</label
              ><input
                type="text"
                id="supplierAddress"
                class="w-full p-3 border rounded-xl"
              />
            </div>
            <div class="flex gap-3 mt-6">
              <button
                type="button"
                onclick="closeModal('supplierModal')"
                class="flex-1 py-3 bg-gray-200 rounded-xl font-semibold"
              >
                إلغاء
              </button>
              <button
                type="submit"
                class="flex-1 py-3 bg-blue-700 text-white rounded-xl font-semibold"
              >
                حفظ
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="purchaseModal" class="modal">
      <div class="modal-content">
        <div
          class="bg-green-800 text-white p-4 sm:p-6 rounded-t-2xl flex justify-between items-center"
        >
          <h3 class="text-lg sm:text-xl font-bold">تسجيل مشتريات</h3>
          <button
            onclick="closeModal('purchaseModal')"
            class="text-white hover:text-gray-200 text-2xl"
          >
            &times;
          </button>
        </div>
        <div class="p-4 sm:p-6">
          <form id="purchaseForm" onsubmit="savePurchase(event)">
            <input type="hidden" id="purchaseSupplierId" />
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1">المورد</label
              ><input
                type="text"
                id="purchaseSupplierName"
                readonly
                class="w-full p-3 border rounded-xl bg-gray-100 font-bold"
              />
            </div>
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1"
                >المبلغ الإجمالي (دج)</label
              ><input
                type="number"
                step="0.01"
                id="purchaseAmount"
                required
                class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none text-xl font-bold"
              />
            </div>
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1"
                >ملاحظات (اختياري)</label
              ><textarea
                id="purchaseNotes"
                rows="3"
                class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none"
              ></textarea>
            </div>
            <div class="flex gap-3 mt-6">
              <button
                type="button"
                onclick="closeModal('purchaseModal')"
                class="flex-1 py-3 bg-gray-200 rounded-xl font-semibold"
              >
                إلغاء
              </button>
              <button
                type="submit"
                class="flex-1 py-3 bg-green-700 text-white rounded-xl font-semibold"
              >
                تسجيل
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="workerModal" class="modal">
      <div class="modal-content">
        <div
          class="bg-green-800 text-white p-4 sm:p-6 rounded-t-2xl flex justify-between items-center"
        >
          <h3 class="text-lg sm:text-xl font-bold" id="modalWorkerTitle">
            إضافة موظف
          </h3>
          <button
            onclick="closeModal('workerModal')"
            class="text-white hover:text-gray-200 text-2xl"
          >
            &times;
          </button>
        </div>
        <div class="p-4 sm:p-6">
          <form id="workerForm" onsubmit="saveWorker(event)">
            <input type="hidden" id="workerId" />
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1">اسم الموظف</label
              ><input
                type="text"
                id="workerName"
                required
                class="w-full p-3 border rounded-xl"
              />
            </div>
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1">رقم الهاتف</label
              ><input
                type="tel"
                id="workerPhone"
                placeholder="0555123456"
                class="w-full p-3 border rounded-xl"
              />
            </div>
            <div class="mb-4">
              <label class="block text-sm font-semibold mb-1"
                >الكود (4-6 أرقام)</label
              ><input
                type="text"
                id="workerPin"
                required
                maxlength="6"
                class="w-full p-3 border rounded-xl text-center text-2xl"
              />
            </div>
            <div class="flex gap-3 mt-6">
              <button
                type="button"
                onclick="closeModal('workerModal')"
                class="flex-1 py-3 bg-gray-200 rounded-xl font-semibold"
              >
                إلغاء
              </button>
              <button
                type="submit"
                class="flex-1 py-3 bg-green-700 text-white rounded-xl font-semibold"
              >
                حفظ
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      // ====================== البيانات ======================
      let db = {
        setupCompleted: false,
        shopName: "متجر الشاي الذهبي",
        manager: { name: "", pin: "", phone: "" },
        workers: [],
        products: [],
        sales: [],
        debts: [],
        suppliers: [],
        purchases: [],
        transactions: [],
        cashRegister: 0,
        nextInvoice: 1001,
        googleSheetURL: "",
        lastSyncTime: null,
        autoSyncEnabled: false,
      };

      let currentStep = 1;
      let setupData = {
        shopName: "",
        managerName: "",
        managerPin: "",
        googleURL: "",
      };
      let currentPin = "";
      let cart = [];
      let syncInterval = null;
      const CURRENCY = "دج";

      // ====================== دوال أساسية ======================
      function saveData() {
        localStorage.setItem("teaShopDB", JSON.stringify(db));
      }

      // ====================== تسجيل المعاملات ======================
      function addTransaction(type, description, amount) {
        if (type === "in") {
          db.cashRegister += amount;
        } else if (type === "out") {
          db.cashRegister -= amount;
        }
        db.transactions.push({
          id: Date.now(),
          date: new Date().toISOString(),
          type: type,
          description: description,
          amount: amount,
          balanceAfter: db.cashRegister,
          user: db.currentUser ? db.currentUser.name : "النظام",
        });
        saveData();
      }

      // ====================== بدء التشغيل ======================
      window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const sheetURL = urlParams.get("sheet");
        const autoSetup = urlParams.get("autoSetup");
        const saved = localStorage.getItem("teaShopDB");
        if (saved) {
          db = JSON.parse(saved);
          if (!db.googleSheetURL) db.googleSheetURL = "";
          if (!db.purchases) db.purchases = [];
          if (!db.manager) db.manager = { name: "", pin: "", phone: "" };
          if (!db.transactions) db.transactions = [];
          if (!db.cashRegister) db.cashRegister = 0;
        }
        if (sheetURL && autoSetup === "true" && !db.setupCompleted) {
          await quickSetup(sheetURL);
          return;
        }
        if (sheetURL && db.setupCompleted) {
          db.googleSheetURL = decodeURIComponent(sheetURL);
          saveData();
          alert("✅ تم تحديث رابط المزامنة");
          showLoginScreen();
          return;
        }
        if (!db.setupCompleted) {
          document.getElementById("setupScreen").classList.remove("hidden");
          showSetupStep(1);
        } else {
          showLoginScreen();
        }
      };

      async function quickSetup(sheetURL) {
        db.googleSheetURL = decodeURIComponent(sheetURL);
        const statusDiv = document.createElement("div");
        statusDiv.className = "loading-overlay";
        statusDiv.innerHTML = `<div class="loading-box"><div style="font-size:50px;margin-bottom:20px;">☁️</div><h3 style="font-size:20px;margin-bottom:10px;">جاري التحميل من السحابة...</h3><p style="color:#666;">يرجى الانتظار</p></div>`;
        document.body.appendChild(statusDiv);
        try {
          const response = await fetch(db.googleSheetURL + "?action=get", {
            method: "GET",
          });
          const data = await response.json();
          if (data.status === "success" && data.hasData) {
            db.setupCompleted = true;
            db.shopName = data.shopName;
            db.manager = {
              name: data.manager.name,
              pin: data.manager.pin,
              phone: data.manager.phone || "",
            };
            db.cashRegister = data.cashRegister || 0;
            db.products = data.products || [];
            db.sales = data.sales || [];
            db.debts = data.debts || [];
            db.suppliers = data.suppliers || [];
            db.workers = data.workers || [];
            db.purchases = data.purchases || [];
            db.transactions = data.transactions || [];
            db.nextInvoice = data.nextInvoice || 1001;
            saveData();
            document.body.removeChild(statusDiv);
            alert(
              `✅ تم استعادة البيانات من السحابة!\n\n📦 المتجر: ${db.shopName}\n👤 المدير: ${db.manager.name}\n🔑 الكود: ${db.manager.pin}\n📊 ${db.products.length} منتج\n💰 ${db.sales.length} عملية بيع\n👥 ${db.workers.length} موظف\n💰 الخزنة: ${db.cashRegister} ${CURRENCY}`,
            );
            showLoginScreen();
            return;
          }
        } catch (error) {
          console.log("لم نجد بيانات - سننشئ بيانات جديدة");
        }
        document.body.removeChild(statusDiv);
        db.setupCompleted = true;
        db.shopName = "متجر الشاي الذهبي";
        db.manager = { name: "المدير", pin: "123456", phone: "" };
        db.cashRegister = 0;
        db.products = [
          {
            id: 1,
            name: "شاي أخضر 250ج",
            barcode: "12345601",
            cost: 350,
            retail: 650,
            wholesale: 520,
            stock: 150,
            category: "شاي",
            unit: "bag",
          },
          {
            id: 2,
            name: "شاي أحمر 500ج",
            barcode: "12345602",
            cost: 680,
            retail: 1250,
            wholesale: 980,
            stock: 90,
            category: "شاي",
            unit: "bag",
          },
          {
            id: 3,
            name: "إبريق شاي",
            barcode: "12345604",
            cost: 900,
            retail: 1800,
            wholesale: 1400,
            stock: 30,
            category: "أواني",
            unit: "piece",
          },
        ];
        db.suppliers = [
          {
            id: 1,
            name: "مورد الشاي الأخضر",
            phone: "0551234567",
            address: "",
            totalPurchases: 0,
          },
        ];
        saveData();
        await syncToGoogleSheets(true);
        alert("✅ إعداد سريع!\n\nكود المدير: 123456");
        showLoginScreen();
      }

      function generateSetupLink() {
        if (!db.googleSheetURL) {
          alert("⚠️ يجب إعداد رابط Google Sheet أولاً");
          return;
        }
        const baseURL = window.location.origin + window.location.pathname;
        const setupLink = `${baseURL}?sheet=${encodeURIComponent(db.googleSheetURL)}&autoSetup=true`;
        navigator.clipboard
          .writeText(setupLink)
          .then(() => {
            alert("✅ تم نسخ رابط الإعداد السريع!");
          })
          .catch(() => {
            prompt("انسخ هذا الرابط:", setupLink);
          });
      }

      function toggleMobileSidebar() {
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");
        sidebar.classList.toggle("open");
        overlay.classList.toggle("active");
      }

      function closeMobileSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sidebarOverlay").classList.remove("active");
      }

      // ====================== Setup ======================
      function showSetupStep(step) {
        currentStep = step;
        document
          .querySelectorAll(".step")
          .forEach((el, i) =>
            el.classList.toggle("step-active", i + 1 === step),
          );
        const content = document.getElementById("setupContent");
        if (step === 1) {
          content.innerHTML = `<h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6">معلومات المتجر</h2><input id="shopNameInput" type="text" placeholder="اسم المتجر" value="${setupData.shopName || "متجر الشاي الذهبي"}" class="w-full p-3 sm:p-4 border-2 rounded-2xl text-lg sm:text-xl focus:outline-none focus:border-amber-600"/>`;
        } else if (step === 2) {
          content.innerHTML = `<h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6">حساب المدير</h2><input id="managerNameInput" type="text" placeholder="اسم المدير" value="${setupData.managerName}" class="w-full p-3 sm:p-4 border-2 rounded-2xl mb-4"/><input id="managerPinInput" type="text" maxlength="6" placeholder="كود المدير" class="w-full p-3 sm:p-4 border-2 rounded-2xl text-center text-xl sm:text-2xl"/>`;
        } else if (step === 3) {
          content.innerHTML = `<h2 class="text-xl sm:text-2xl font-bold mb-4 sm:mb-6">المزامنة (اختياري)</h2><input id="googleURLInput" type="url" placeholder="https://script.google.com/..." value="${setupData.googleURL}" class="w-full p-3 sm:p-4 border-2 rounded-2xl mb-4 text-xs sm:text-sm"/>`;
        }
      }

      function nextStep() {
        if (currentStep === 1) {
          setupData.shopName = document
            .getElementById("shopNameInput")
            .value.trim();
          showSetupStep(2);
        } else if (currentStep === 2) {
          const name = document.getElementById("managerNameInput").value.trim();
          const pin = document.getElementById("managerPinInput").value.trim();
          if (!name || !pin || pin.length < 4) {
            alert("أدخل اسم وكود المدير (4+ أرقام)");
            return;
          }
          setupData.managerName = name;
          setupData.managerPin = pin;
          showSetupStep(3);
        } else if (currentStep === 3) {
          finishSetup();
        }
      }

      function prevStep() {
        if (currentStep > 1) showSetupStep(currentStep - 1);
      }

      function finishSetup() {
        if (!setupData.managerPin) {
          alert("يجب إعداد المدير");
          return;
        }
        db.setupCompleted = true;
        db.shopName = setupData.shopName || "متجر الشاي الذهبي";
        db.manager = {
          name: setupData.managerName,
          pin: setupData.managerPin,
          phone: "",
        };
        db.googleSheetURL =
          document.getElementById("googleURLInput")?.value.trim() || "";
        db.products = [
          {
            id: 1,
            name: "شاي أخضر 250ج",
            barcode: "12345601",
            cost: 350,
            retail: 650,
            wholesale: 520,
            stock: 150,
            category: "شاي",
            unit: "bag",
          },
          {
            id: 2,
            name: "شاي أحمر 500ج",
            barcode: "12345602",
            cost: 680,
            retail: 1250,
            wholesale: 980,
            stock: 90,
            category: "شاي",
            unit: "bag",
          },
          {
            id: 3,
            name: "إبريق شاي",
            barcode: "12345604",
            cost: 900,
            retail: 1800,
            wholesale: 1400,
            stock: 30,
            category: "أواني",
            unit: "piece",
          },
        ];
        db.suppliers = [
          {
            id: 1,
            name: "مورد الشاي",
            phone: "0551234567",
            address: "",
            totalPurchases: 0,
          },
        ];
        db.cashRegister = 0;
        saveData();
        alert("✅ تم الإعداد!");
        document.getElementById("setupScreen").classList.add("hidden");
        showLoginScreen();
      }

      // ====================== Login ======================
      function showLoginScreen() {
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("shopNameDisplay").textContent = db.shopName;
        setTimeout(
          () => document.getElementById("pinInputDirect")?.focus(),
          300,
        );
      }

      function showPinPad() {
        document.getElementById("pinPadSection").classList.remove("hidden");
        createPinPad();
      }

      function createPinPad() {
        const pad = document.getElementById("pinPad");
        if (!pad) return;
        pad.innerHTML = "";
        for (let i = 1; i <= 9; i++)
          pad.innerHTML += `<button onclick="addPin('${i}')" type="button" class="bg-gray-100 hover:bg-amber-100 py-4 sm:py-6 text-xl sm:text-2xl font-bold rounded-2xl">${i}</button>`;
        pad.innerHTML += `<button onclick="addPin('0')" type="button" class="bg-gray-100 hover:bg-amber-100 py-4 sm:py-6 text-xl sm:text-2xl font-bold rounded-2xl">0</button>`;
      }

      function addPin(num) {
        if (currentPin.length < 6) {
          currentPin += num;
          document.getElementById("pinInput").value = "●".repeat(
            currentPin.length,
          );
        }
      }
      function clearPin() {
        currentPin = "";
        document.getElementById("pinInput").value = "";
      }

      function verifyLoginDirect() {
        const pin = document.getElementById("pinInputDirect").value.trim();
        if (!pin) {
          alert("⚠️ أدخل الكود");
          return;
        }
        const inputPin = pin.toString();
        const managerPin = (db.manager.pin || "").toString();
        if (inputPin === managerPin) {
          loginSuccess({ type: "manager", ...db.manager });
          return;
        }
        const worker = db.workers.find(
          (w) => (w.pin || "").toString() === inputPin,
        );
        if (worker) {
          loginSuccess({ type: "worker", ...worker });
          return;
        }
        alert("❌ كود خاطئ\nاضغط '🔍 معلومات الكود' لمعرفة الكود المحفوظ");
        document.getElementById("pinInputDirect").value = "";
      }

      function verifyLoginPad() {
        if (!currentPin) return;
        const inputPin = currentPin.toString();
        const managerPin = (db.manager.pin || "").toString();
        if (inputPin === managerPin) {
          loginSuccess({ type: "manager", ...db.manager });
          return;
        }
        const worker = db.workers.find(
          (w) => (w.pin || "").toString() === inputPin,
        );
        if (worker) {
          loginSuccess({ type: "worker", ...worker });
          return;
        }
        alert("❌ كود خاطئ");
        clearPin();
      }

      function loginSuccess(user) {
        db.currentUser = user;
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("mainApp").classList.remove("hidden");
        document.getElementById("currentUserDisplay").innerHTML =
          `<strong>${user.name}</strong><br><small class="text-amber-200">${user.type === "manager" ? "مدير" : "عامل"}</small>`;
        if (db.autoSyncEnabled && db.googleSheetURL) startAutoSync();
        loadPage(0);
      }

      function logout() {
        if (confirm("تسجيل خروج؟")) {
          stopAutoSync();
          location.reload();
        }
      }

      function showPasswordInfo() {
        const info = `=== معلومات الكود المحفوظ ===\n\nكود المدير: "${db.manager.pin}"\nنوع البيانات: ${typeof db.manager.pin}\nالطول: ${db.manager.pin ? db.manager.pin.toString().length : 0}\n\nاسم المدير: ${db.manager.name}\nهاتف المدير: ${db.manager.phone}\n\nعدد الموظفين: ${db.workers.length}`;
        console.log(info);
        alert(info);
        if (db.manager.pin)
          navigator.clipboard
            .writeText(db.manager.pin.toString())
            .then(() => console.log("✅ تم نسخ الكود"))
            .catch(() => console.log("الكود: " + db.manager.pin));
      }

      // ====================== Navigation ======================
      function navigate(pageNum) {
        document
          .querySelectorAll(".sidebar-item")
          .forEach((el) => el.classList.remove("active"));
        event.currentTarget.classList.add("active");
        loadPage(pageNum);
      }

      function loadPage(pageNum) {
        const content = document.getElementById("mainContent");
        content.innerHTML = "";
        if (pageNum === 0) loadPOS(content);
        else if (pageNum === 1) loadProducts(content);
        else if (pageNum === 2) loadDebts(content);
        else if (pageNum === 3) loadSuppliers(content);
        else if (pageNum === 4) loadReports(content);
        else if (pageNum === 5) loadCashRegister(content);
        else if (pageNum === 6) loadSync(content);
        else if (pageNum === 7) loadManager(content);
      }

      // ====================== POS ======================
      function loadPOS(container) {
        container.innerHTML = `<h1 class="text-2xl sm:text-3xl font-bold mb-4 sm:mb-6 text-gray-800">💰 نقطة البيع</h1>
        <div class="grid grid-cols-12 gap-4 sm:gap-6">
          <div class="col-span-12 lg:col-span-7 bg-white rounded-3xl shadow-lg p-4 sm:p-6">
            <input type="text" id="barcodeInput" placeholder="امسح الباركود..." class="w-full text-lg sm:text-xl p-3 sm:p-5 border-2 border-dashed border-amber-400 rounded-2xl mb-4 sm:mb-6 focus:outline-none focus:border-amber-600" onkeypress="if(event.key==='Enter') { handleBarcode(this.value); this.value=''; }"/>
            <div id="cartItems" class="max-h-60 sm:max-h-96 overflow-auto mb-4 sm:mb-6"></div>
            <div class="border-t-2 pt-4 mb-4 sm:mb-6"><div class="flex justify-between text-xl sm:text-2xl font-bold"><span>الإجمالي:</span><span id="totalAmount" class="text-amber-700">0.00 ${CURRENCY}</span></div></div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
              <button onclick="completeSale(false)" class="bg-green-600 text-white py-4 sm:py-6 rounded-2xl text-lg sm:text-xl font-bold hover:bg-green-700">✅ نقدي</button>
              <button onclick="completeSale(true)" class="bg-orange-600 text-white py-4 sm:py-6 rounded-2xl text-lg sm:text-xl font-bold hover:bg-orange-700">📝 دين</button>
            </div>
          </div>
          <div class="col-span-12 lg:col-span-5 bg-white rounded-3xl shadow-lg p-4 sm:p-6">
            <h3 class="font-bold mb-3 sm:mb-4 text-base sm:text-lg">المنتجات السريعة</h3>
            <div class="grid grid-cols-2 gap-2 sm:gap-3 max-h-96 overflow-auto" id="quickProducts"></div>
          </div>
        </div>`;
        renderQuickProducts();
        renderCart();
        setTimeout(() => document.getElementById("barcodeInput")?.focus(), 300);
      }

      function renderQuickProducts() {
        const container = document.getElementById("quickProducts");
        if (!container) return;
        container.innerHTML = "";
        db.products.forEach((p) => {
          const div = document.createElement("div");
          div.className =
            "bg-amber-50 hover:bg-amber-100 p-3 sm:p-4 rounded-2xl cursor-pointer border-2 border-amber-200 active:scale-95 transition";
          div.innerHTML = `<div class="font-semibold text-xs sm:text-sm mb-1 sm:mb-2 truncate">${p.name}</div><div class="text-amber-700 font-bold text-sm sm:text-base">${p.retail} ${CURRENCY}</div>`;
          div.onclick = () => addToCart(p);
          container.appendChild(div);
        });
      }

      function addToCart(product) {
        if (product.stock <= 0) {
          alert("⚠️ غير متوفر");
          return;
        }
        const existing = cart.find((item) => item.id === product.id);
        if (existing) {
          if (existing.qty < product.stock) existing.qty++;
          else return;
        } else {
          cart.push({ ...product, qty: 1 });
        }
        renderCart();
      }

      function renderCart() {
        const container = document.getElementById("cartItems");
        if (!container) return;
        if (cart.length === 0) {
          container.innerHTML = `<div class="text-center text-gray-400 py-6 sm:py-10 text-sm sm:text-base">السلة فارغة</div>`;
          document.getElementById("totalAmount").textContent =
            `0.00 ${CURRENCY}`;
          return;
        }
        let html = `<div class="space-y-2 sm:space-y-3">`;
        cart.forEach((item, i) => {
          html += `<div class="flex justify-between items-center bg-gray-50 p-3 sm:p-4 rounded-2xl text-sm sm:text-base"><div class="flex-1 min-w-0"><div class="font-semibold truncate">${item.name}</div><div class="text-xs sm:text-sm text-gray-500">${item.retail} × ${item.qty}</div></div><div class="text-right ml-2"><div class="font-bold">${(item.retail * item.qty).toFixed(2)} ${CURRENCY}</div><button onclick="removeFromCart(${i})" class="text-red-600 text-xs sm:text-sm mt-1">حذف</button></div></div>`;
        });
        html += `</div>`;
        container.innerHTML = html;
        const total = cart.reduce(
          (sum, item) => sum + item.retail * item.qty,
          0,
        );
        document.getElementById("totalAmount").textContent =
          total.toFixed(2) + ` ${CURRENCY}`;
      }

      function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
      }

      function handleBarcode(barcode) {
        if (!barcode) return;
        let product =
          db.products.find((p) => p.barcode === barcode) ||
          db.products.find((p) => p.name.includes(barcode));
        if (product) addToCart(product);
        else alert("❌ غير موجود");
      }

      function completeSale(isDebt) {
        if (cart.length === 0) return;
        const total = cart.reduce(
          (sum, item) => sum + item.retail * item.qty,
          0,
        );
        if (isDebt) {
          document.getElementById("debtAmount").value = total.toFixed(2);
          document.getElementById("debtModal").style.display = "block";
        } else {
          const sale = {
            id: db.nextInvoice++,
            date: new Date().toISOString(),
            total: total,
            cashier: db.currentUser.name,
            items: [...cart],
          };
          db.sales.push(sale);
          addTransaction("in", `بيع نقدي - فاتورة #${sale.id}`, total);
          printReceipt(cart, total);
          cart.forEach((item) => {
            const prod = db.products.find((p) => p.id === item.id);

          phone,

          paid: 0,
          remaining: amount,
          date: new Date().toLocaleDateString("ar-DZ"),
          items: cart.map((c) => `${c.name} × ${c.qty}`).join(", "),

        db.debts.forEach((debt) => {
          html += `<tr class="border-b hover:bg-gray-50"><td class="p-2 sm:p-3 font-semibold">${debt.customer}</td><td class="p-2 sm:p-3 text-gray-600 hidden sm:table-cell">${debt.phone ? `<a href="tel:${debt.phone}" class="text-blue-600">${debt.phone}</a>` : "-"}</td><td class="p-2 sm:p-3">${debt.amount.toFixed(0)} ${CURRENCY}</td><td class="p-2 sm:p-3 text-red-600 font-bold">${debt.remaining.toFixed(0)} ${CURRENCY}</td><td class="p-2 sm:p-3"><button onclick="payDebt(${debt.id})" class="bg-green-100 text-green-700 px-2 sm:px-4 py-1 sm:py-2 rounded-xl hover:bg-green-200 text-xs sm:text-sm">💰</button></td></tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
      }

      function payDebt(debtId) {
        const debt = db.debts.find((d) => d.id === debtId);
        if (!debt) return;
        const amount = parseFloat(
          prompt(`المتبقي: ${debt.remaining} ${CURRENCY}\nالمبلغ المدفوع:`),
        );
        if (!amount || amount <= 0) return;
        if (amount > debt.remaining) {
          alert("⚠️ أكبر من المتبقي");
          return;
        }
        debt.paid += amount;
        debt.remaining -= amount;
        addTransaction("in", `دفع دين من ${debt.customer}`, amount);
        if (debt.remaining <= 0) {
          db.debts = db.debts.filter((d) => d.id !== debtId);
          alert("✅ سُدد بالكامل");
        } else {
          alert(
            `✅ دفعة: ${amount} ${CURRENCY}\nالمتبقي: ${debt.remaining.toFixed(2)} ${CURRENCY}`,
          );
        }
        saveData();
        if (db.googleSheetURL) syncToGoogleSheets(true);
        loadPage(2);
      }

on onclick="editSupplier(${s.id})" class="bg-gray-100 text-gray-700 px-4 py-3 rounded-xl hover:bg-gray-200"><i class="fa-solid fa-edit"></i></button></div></div>`).join("")}</div>`;

      function adjustCashRegister(action) {
        if (db.currentUser.type !== "manager") {
          alert("⛔ هذه الميزة للمدير فقط");
          return;
        }
        let amount, description;
        if (action === "set") {
          amount = parseFloat(
            prompt(
              `الرصيد الحالي: ${db.cashRegister.toFixed(2)} ${CURRENCY}\n\nأدخل الرصيد الجديد:`,
            ),
          );
          if (isNaN(amount) || amount < 0) return;
          description = "تعيين الرصيد يدوياً";
          const diff = amount - db.cashRegister;
          db.cashRegister = amount;
          db.transactions.push({
            id: Date.now(),
            date: new Date().toISOString(),
            type: diff >= 0 ? "in" : "out",
            description,
            amount: Math.abs(diff),
            balanceAfter: db.cashRegister,
            user: db.currentUser.name,
          });
        } else if (action === "add") {
          amount = parseFloat(prompt(`إضافة مبلغ للخزنة:`));
          if (isNaN(amount) || amount <= 0) return;
          description = prompt("سبب الإضافة (اختياري):") || "إضافة يدوية";
          addTransaction("in", description, amount);
        } else if (action === "subtract") {
          amount = parseFloat(prompt(`سحب مبلغ من الخزنة:`));
          if (isNaN(amount) || amount <= 0) return;
          if (
            amount > db.cashRegister &&
            !confirm(
              `⚠️ المبلغ أكبر من الرصيد الحالي!\nالرصيد: ${db.cashRegister.toFixed(2)}\nالسحب: ${amount.toFixed(2)}\nهل تريد المتابعة؟`,
            )
          )
            return;
          description = prompt("سبب السحب (اختياري):") || "سحب يدوي";
          addTransaction("out", description, amount);
        }
        saveData();
        if (db.googleSheetURL) syncToGoogleSheets(true);
        alert(
          `✅ تم تحديث الخزنة\nالرصيد الجديد: ${db.cashRegister.toFixed(2)} ${CURRENCY}`,
        );
        loadPage(5);
      }

        a.download = `transactions_${new Date().toISOString().slice(0, 10)}.csv`;

          ? new Date(db.lastSyncTime).toLocaleString("ar-DZ")
          : "لم تتم";
        const isConfigured = db.googleSheetURL ? true : false;
        container.innerHTML = `<h1 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">🔄 المزامنة</h1>
        ${
          !isConfigured
            ? `<div class="bg-amber-100 border-2 border-amber-300 rounded-3xl p-4 sm:p-8 mb-6 sm:mb-8"><h2 class="text-xl sm:text-2xl font-bold text-amber-900 mb-4">⚠️ المزامنة غير مُعدة</h2><button onclick="loadPage(7)" class="bg-amber-700 text-white px-6 sm:px-8 py-3 sm:py-4 rounded-2xl font-bold text-sm sm:text-base">إعداد الآن</button></div>`
            : `<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-8"><div class="bg-gradient-to-br from-green-50 to-green-100 p-4 sm:p-8 rounded-3xl border-2 border-green-200"><div class="flex items-center gap-3 sm:gap-4 mb-4 sm:mb-6"><i class="fa-brands fa-google text-3xl sm:text-5xl text-green-600"></i><div><h2 class="text-lg sm:text-2xl font-bold text-green-800">Google Sheets</h2><p class="text-xs sm:text-sm text-green-600">متصل ✓</p></div></div><div class="bg-white p-3 sm:p-4 rounded-2xl mb-3 sm:mb-4"><div class="text-xs sm:text-sm text-gray-600">آخر مزامنة:</div><div class="font-bold text-sm sm:text-base">${lastSync}</div></div><div class="space-y-2 sm:space-y-3"><button onclick="syncToGoogleSheets()" class="w-full py-3 sm:py-4 bg-green-600 text-white rounded-2xl font-bold text-sm sm:text-base hover:bg-green-700">☁️ رفع البيانات (Upload)</button><button onclick="pullFromGoogleSheets()" class="w-full py-3 sm:py-4 bg-blue-600 text-white rounded-2xl font-bold text-sm sm:text-base hover:bg-blue-700">📥 تحميل البيانات (Download)</button><label class="flex items-center gap-2 sm:gap-3 p-3 sm:p-4 bg-white rounded-2xl cursor-pointer border-2 ${db.autoSyncEnabled ? "border-green-500" : ""} text-xs sm:text-sm"><input type="checkbox" ${db.autoSyncEnabled ? "checked" : ""} onchange="toggleAutoSync(this.checked)" class="w-4 h-4 sm:w-5 sm:h-5"/><span class="font-semibold">مزامنة تلقائية (5 دقائق)</span></label></div><div id="syncStatus"></div></div><div class="bg-white p-4 sm:p-8 rounded-3xl shadow-lg"><h3 class="text-lg sm:text-xl font-bold mb-3 sm:mb-4">📊 الإحصائيات</h3><div class="space-y-2 sm:space-y-3 text-xs sm:text-sm"><div class="flex justify-between p-2 sm:p-3 bg-gray-50 rounded-xl"><span>المنتجات:</span><strong>${db.products.length}</strong></div><div class="flex justify-between p-2 sm:p-3 bg-gray-50 rounded-xl"><span>المبيعات:</span><strong>${db.sales.length}</strong></div><div class="flex justify-between p-2 sm:p-3 bg-gray-50 rounded-xl"><span>الموظفين:</span><strong>${db.workers.length}</strong></div><div class="flex justify-between p-2 sm:p-3 bg-gray-50 rounded-xl"><span>الموردين:</span><strong>${db.suppliers.length}</strong></div><div class="flex justify-between p-2 sm:p-3 bg-gray-50 rounded-xl"><span>المعاملات:</span><strong>${db.transactions.length}</strong></div><div class="flex justify-between p-2 sm:p-3 bg-gray-50 rounded-xl"><span>الخزنة:</span><strong>${db.cashRegister.toFixed(2)} ${CURRENCY}</strong></div></div></div></div>`
        }`;
      }

      async function syncToGoogleSheets(silent = false) {
        if (!db.googleSheetURL) {
          if (!silent) alert("⚠️ لم يتم إعداد رابط Google Sheet");
          return;
        }
        const statusEl = document.getElementById("syncStatus");
        if (statusEl)
          statusEl.innerHTML = `<div class="sync-loading mt-4">🔄 جاري المزامنة...</div>`;
        try {
          const data = {
            action: "sync",
            shopName: db.shopName || "متجر الشاي الذهبي",
            manager: db.manager || { name: "", pin: "", phone: "" },
            cashRegister: db.cashRegister || 0,
            nextInvoice: db.nextInvoice || 1001,
            products: Array.isArray(db.products) ? db.products : [],
            sales: Array.isArray(db.sales) ? db.sales : [],
            debts: Array.isArray(db.debts) ? db.debts : [],
            suppliers: Array.isArray(db.suppliers) ? db.suppliers : [],
            workers: Array.isArray(db.workers) ? db.workers : [],
            purchases: Array.isArray(db.purchases) ? db.purchases : [],
            transactions: Array.isArray(db.transactions) ? db.transactions : [],
            timestamp: new Date().toISOString(),
          };
          const response = await fetch(db.googleSheetURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
            mode: "no-cors",
          });
          db.lastSyncTime = new Date().toISOString();
          saveData();
          const detailsMsg = `✅ تمت المزامنة!\n\n📦 المنتجات: ${data.products.length}\n💰 المبيعات: ${data.sales.length}\n👥 الموظفين: ${data.workers.length}\n🚚 الموردين: ${data.suppliers.length}\n🛒 المشتريات: ${data.purchases.length}\n💳 المعاملات: ${data.transactions.length}\n💰 الخزنة: ${data.cashRegister} ${CURRENCY}`;
          if (statusEl)
            statusEl.innerHTML = `<div class="sync-success mt-4">${detailsMsg.replace(/\n/g, "<br>")}</div>`;
          if (!silent) alert(detailsMsg);
          updateSyncIndicator();
        } catch (error) {
          console.error("خطأ المزامنة:", error);
          if (statusEl)
            statusEl.innerHTML = `<div class="sync-error mt-4">❌ فشلت المزامنة: ${error.message}</div>`;
          if (!silent) alert(`❌ فشلت المزامنة\n\n${error.message}`);
        }
      }

      async function pullFromGoogleSheets() {
        if (!db.googleSheetURL) {
          alert("⚠️ لم يتم إعداد رابط Google Sheet");
          return;
        }
        const statusEl = document.getElementById("syncStatus");
        if (statusEl)
          statusEl.innerHTML = `<div class="sync-loading mt-4">📥 جاري التحميل من السحابة...</div>`;
        try {
          const response = await fetch(db.googleSheetURL + "?action=get", {
            method: "GET",
          });
          const data = await response.json();
          if (data.status === "success" && data.hasData) {
            const confirmed = confirm(
              `هل تريد استبدال البيانات المحلية بالبيانات من السحابة؟\n\n📦 ${data.products.length} منتج\n💰 ${data.sales.length} عملية\n👥 ${data.workers.length} موظف\n💰 الخزنة: ${data.cashRegister} ${CURRENCY}\n\n⚠️ سيتم استبدال كل البيانات المحلية!`,
            );
            if (!confirmed) {
              if (statusEl)
                statusEl.innerHTML = `<div class="sync-error mt-4">❌ تم الإلغاء</div>`;
              return;
            }
            if (data.shopName) db.shopName = data.shopName;
            if (data.manager && data.manager.name)
              db.manager = {
                name: data.manager.name || "",
                pin: (data.manager.pin || "").toString(),
                phone: data.manager.phone || "",
              };
            if (data.cashRegister !== undefined)
              db.cashRegister = data.cashRegister;
            if (data.products) db.products = data.products;
            if (data.sales) db.sales = data.sales;
            if (data.debts) db.debts = data.debts;
            if (data.suppliers) db.suppliers = data.suppliers;
            if (data.workers) db.workers = data.workers;
            if (data.purchases) db.purchases = data.purchases;
            if (data.transactions) db.transactions = data.transactions;
            if (data.nextInvoice) db.nextInvoice = data.nextInvoice;
            db.lastSyncTime = new Date().toISOString();
            saveData();
            if (statusEl)
              statusEl.innerHTML = `<div class="sync-success mt-4">✅ تم التحميل من السحابة بنجاح!</div>`;
            alert(
              `✅ تم تحميل البيانات!\n\n📦 ${data.products.length} منتج\n💰 ${data.sales.length} عملية\n👥 ${data.workers.length} موظف\n💰 الخزنة: ${db.cashRegister} ${CURRENCY}`,
            );
            const currentPage = Array.from(
              document.querySelectorAll(".sidebar-item"),
            ).findIndex((el) => el.classList.contains("active"));
            if (currentPage >= 0) loadPage(currentPage);
          } else if (data.status === "success" && !data.hasData) {
            if (statusEl)
              statusEl.innerHTML = `<div class="sync-error mt-4">⚠️ لا توجد بيانات في السحابة</div>`;
            alert("⚠️ لا توجد بيانات محفوظة في Google Sheets");
          } else {
            throw new Error(data.message || "فشل التحميل");
          }
        } catch (error) {
          console.error("Pull error:", error);
          if (statusEl)
            statusEl.innerHTML = `<div class="sync-error mt-4">❌ فشل التحميل: ${error.message}</div>`;
          alert(`❌ فشل التحميل من السحابة\n\n${error.message}`);
        }
      }

      function toggleAutoSync(enabled) {
        db.autoSyncEnabled = enabled;
        saveData();
        if (enabled) {
          startAutoSync();
          alert("✅ مزامنة تلقائية مفعّلة");
        } else {
          stopAutoSync();
          alert("⏸️ مزامنة تلقائية موقفة");
        }
      }
      function startAutoSync() {
        stopAutoSync();
        if (db.googleSheetURL)
          syncInterval = setInterval(
            () => syncToGoogleSheets(true),
            5 * 60 * 1000,
          );
        updateSyncIndicator();
      }
      function stopAutoSync() {
        if (syncInterval) {
          clearInterval(syncInterval);
          syncInterval = null;
        }
      }
      function updateSyncIndicator() {
        const indicator = document.getElementById("syncIndicator");
        if (!indicator) return;
        if (db.autoSyncEnabled) indicator.innerHTML = `🔄 تلقائي`;
        else if (db.lastSyncTime) {
          const minutes = Math.floor(
            (Date.now() - new Date(db.lastSyncTime)) / 60000,
          );
          indicator.innerHTML = `${minutes}د`;
        }
      }

      // ====================== Manager ======================
      function loadManager(container) {
        if (db.currentUser.type !== "manager") {
          container.innerHTML = `<div class="text-center py-10 sm:py-20"><i class="fa-solid fa-lock text-4xl sm:text-6xl text-gray-300 mb-4"></i><h2 class="text-xl sm:text-2xl font-bold text-gray-600">للمدير فقط</h2></div>`;

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6"><div class="bg-white p-4 sm:p-6 rounded-3xl shadow-lg"><h3 class="font-bold text-lg sm:text-xl mb-3 sm:mb-4">⚙️ الإعدادات</h3><button onclick="changeShopName()" class="w-full mb-2 sm:mb-3 py-2 sm:py-3 bg-blue-100 text-blue-700 rounded-xl text-sm sm:text-base">تغيير اسم المتجر</button><button onclick="changeAdminPin()" class="w-full mb-2 sm:mb-3 py-2 sm:py-3 bg-red-100 text-red-700 rounded-xl text-sm sm:text-base">تغيير كود المدير</button><button onclick="changeGoogleURL()" class="w-full mb-2 sm:mb-3 py-2 sm:py-3 bg-green-100 text-green-700 rounded-xl text-sm sm:text-base">تحديث رابط Google</button><button onclick="testWorkersData()" class="w-full py-2 sm:py-3 bg-purple-100 text-purple-700 rounded-xl text-sm sm:text-base">🧪 اختبار بيانات الموظفين</button></div><div class="bg-white p-4 sm:p-6 rounded-3xl shadow-lg"><div class="flex justify-between items-center mb-3 sm:mb-4"><h3 class="font-bold text-lg sm:text-xl">👥 الموظفين</h3><button onclick="openWorkerModal()" class="bg-green-600 text-white px-3 sm:px-4 py-1 sm:py-2 rounded-xl text-xs sm:text-sm">➕</button></div><div id="workersList" class="space-y-2 max-h-64 sm:max-h-96 overflow-auto"></div></div></div>`;
        renderWorkersList();
      }

      function renderWorkersList() {
        const container = document.getElementById("workersList");
        if (!container) return;
        if (db.workers.length === 0) {
          container.innerHTML = `<p class="text-gray-400 text-center py-4 text-xs sm:text-sm">لا يوجد موظفين</p>`;
          return;
        }
        container.innerHTML = db.workers
          .map(
            (w, i) =>
              `<div class="flex justify-between items-center p-2 sm:p-3 bg-gray-50 rounded-xl text-xs sm:text-sm"><div class="flex-1 min-w-0"><div class="font-semibold truncate">${w.name}</div><div class="text-xs text-gray-500">كود: ${w.pin}</div></div><div class="flex gap-1 sm:gap-2 ml-2"><button onclick="editWorker(${i})" class="text-blue-600 px-2 sm:px-3 py-1 border border-blue-200 rounded-lg text-xs">تعديل</button><button onclick="removeWorker(${i})" class="text-red-600 px-2 sm:px-3 py-1 border border-red-200 rounded-lg text-xs">حذف</button></div></div>`,
          )
          .join("");
      }

      function openWorkerModal(index = null) {
        const modal = document.getElementById("workerModal");
        if (index !== null) {
          const w = db.workers[index];
          document.getElementById("modalWorkerTitle").textContent = "تعديل";
          document.getElementById("workerId").value = index;
          document.getElementById("workerName").value = w.name;
          document.getElementById("workerPhone").value = w.phone || "";
          document.getElementById("workerPin").value = w.pin;
        } else {
          document.getElementById("modalWorkerTitle").textContent = "إضافة";
          document.getElementById("workerForm").reset();
          document.getElementById("workerId").value = "";
        }
        modal.style.display = "block";
      }

      function saveWorker(e) {
        e.preventDefault();
        const index = document.getElementById("workerId").value;
        const newWorker = {
          id: index !== "" ? db.workers[index].id : Date.now(),
          name: document.getElementById("workerName").value,
          phone: document.getElementById("workerPhone").value,
          pin: document.getElementById("workerPin").value,
          role: "عامل",
        };
        if (index !== "") db.workers[index] = newWorker;
        else db.workers.push(newWorker);
        saveData();
        if (db.googleSheetURL) syncToGoogleSheets(true);
        closeModal("workerModal");
        loadPage(7);
      }

      function editWorker(index) {
        openWorkerModal(index);
      }
      function removeWorker(index) {
        if (confirm(`حذف ${db.workers[index].name}؟`)) {
          db.workers.splice(index, 1);
          saveData();
          if (db.googleSheetURL) syncToGoogleSheets(true);
          loadPage(7);
        }
      }
      function changeShopName() {
        const newName = prompt("اسم المتجر:", db.shopName);
        if (newName) {
          db.shopName = newName;
          saveData();
          alert("✅ تم");
          loadPage(7);
        }
      }
      function changeAdminPin() {
        const newPin = prompt("كود جديد:");
        if (newPin && newPin.length >= 4) {
          db.manager.pin = newPin;
          saveData();
          if (db.googleSheetURL) syncToGoogleSheets(true);
          alert("✅ تم تغيير الكود وتحديثه في السحابة");
        }
      }
      function changeGoogleURL() {
        const newURL = prompt("رابط Google:", db.googleSheetURL);
        if (newURL && newURL.startsWith("https://script.google.com")) {
          db.googleSheetURL = newURL;
          saveData();
          alert("✅ تم");
          loadPage(7);
        }
      }
      function testWorkersData() {
        const info = `=== معلومات الموظفين ===\n\nعدد الموظفين: ${db.workers.length}\n\nالبيانات:\n${JSON.stringify(db.workers, null, 2)}\n\nهل المصفوفة فارغة؟ ${db.workers.length === 0 ? "نعم ⚠️" : "لا ✓"}`;
        console.log(info);
        alert(info);
      }

      // ====================== دوال إضافية ======================
      function closeModal(modalId) {
        document.getElementById(modalId).style.display = "none";
      }
      window.onclick = function (event) {
        if (event.target.classList.contains("modal"))
          event.target.style.display = "none";
      };
      setInterval(updateSyncIndicator, 60000);
      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });
    </script>
  </body>
</html>
